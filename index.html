<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Shooter Mobile</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#000;
    touch-action:none;
}

canvas{
    display:block;
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial,sans-serif;
    font-size:20px;
    font-weight:bold;
    z-index:10;
}

.btn{
    position:absolute;
    bottom:20px;
    width:85px;
    height:85px;
    border-radius:50%;
    background:rgba(255,255,255,0.18);
    border:2px solid rgba(255,255,255,0.4);
}

#left{left:20px;}
#right{left:120px;}

#shoot{
    right:20px;
    width:110px;
    height:110px;
    background:rgba(255,60,60,0.3);
}
</style>
</head>
<body>

<div id="ui">
HP: <span id="hp">100</span><br>
Skor: <span id="score">0</span>
</div>

<canvas id="game"></canvas>

<div id="left" class="btn"></div>
<div id="right" class="btn"></div>
<div id="shoot" class="btn"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

const hpText = document.getElementById("hp");
const scoreText = document.getElementById("score");

let score = 0;
let left = false;
let right = false;

const player = {
    x: 200,
    y: 0,
    hp: 100,
    speed: 7
};

const bullets = [];
const enemies = [];
const enemyBullets = [];
const stars = [];
const explosions = [];

for(let i=0;i<120;i++){
    stars.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        s:Math.random()*3+1
    });
}

function shoot(){
    bullets.push({
        x:player.x,
        y:player.y-20,
        r:4
    });
}

function spawnEnemy(){
    enemies.push({
        x:Math.random()*(canvas.width-100)+50,
        y:-60,
        speed:2+Math.random()*2,
        shoot:0
    });
}
setInterval(spawnEnemy,1000);

function explosion(x,y){
    for(let i=0;i<15;i++){
        explosions.push({
            x,y,
            vx:(Math.random()-0.5)*6,
            vy:(Math.random()-0.5)*6,
            life:30
        });
    }
}

function drawStars(){
    ctx.fillStyle="white";

    stars.forEach(s=>{
        ctx.fillRect(s.x,s.y,s.s,s.s);

        s.y += 2;

        if(s.y>canvas.height){
            s.y=0;
            s.x=Math.random()*canvas.width;
        }
    });
}

function drawPlayer(){

    ctx.save();
    ctx.translate(player.x,player.y);

    let g=ctx.createLinearGradient(-20,0,20,0);
    g.addColorStop(0,"#00e5ff");
    g.addColorStop(1,"#0066ff");

    ctx.fillStyle=g;

    ctx.beginPath();
    ctx.moveTo(0,-35);
    ctx.quadraticCurveTo(25,-5,15,35);
    ctx.lineTo(0,20);
    ctx.lineTo(-15,35);
    ctx.quadraticCurveTo(-25,-5,0,-35);
    ctx.fill();

    ctx.fillStyle="#aaffff";
    ctx.beginPath();
    ctx.ellipse(0,-5,8,15,0,0,Math.PI*2);
    ctx.fill();

    ctx.restore();
}

function drawEnemy(x,y){

    ctx.save();
    ctx.translate(x,y);

    let g=ctx.createLinearGradient(-20,0,20,0);
    g.addColorStop(0,"#ff3300");
    g.addColorStop(1,"#ffcc00");

    ctx.fillStyle=g;

    ctx.beginPath();
    ctx.moveTo(0,35);
    ctx.quadraticCurveTo(25,5,20,-25);
    ctx.lineTo(0,-35);
    ctx.lineTo(-20,-25);
    ctx.quadraticCurveTo(-25,5,0,35);
    ctx.fill();

    ctx.restore();
}

function update(){

    player.y = canvas.height-120;

    if(left) player.x -= player.speed;
    if(right) player.x += player.speed;

    player.x = Math.max(30,
        Math.min(canvas.width-30,player.x));

    bullets.forEach((b,i)=>{
        b.y -= 12;

        if(b.y<0)
            bullets.splice(i,1);
    });

    enemies.forEach((e,ei)=>{

        e.y += e.speed;
        e.shoot++;

        if(e.shoot>40){

            for(let a=-1;a<=1;a++){

                enemyBullets.push({
                    x:e.x,
                    y:e.y+20,
                    vx:a*2,
                    vy:5
                });
            }

            e.shoot=0;
        }

        bullets.forEach((b,bi)=>{

            let dx=e.x-b.x;
            let dy=e.y-b.y;

            if(Math.sqrt(dx*dx+dy*dy)<25){

                explosion(e.x,e.y);

                enemies.splice(ei,1);
                bullets.splice(bi,1);

                score += 10;
                scoreText.textContent=score;
            }
        });

        if(e.y>canvas.height+60)
            enemies.splice(ei,1);
    });

    enemyBullets.forEach((b,i)=>{

        b.x += b.vx;
        b.y += b.vy;

        let dx=player.x-b.x;
        let dy=player.y-b.y;

        if(Math.sqrt(dx*dx+dy*dy)<25){

            enemyBullets.splice(i,1);

            player.hp -= 5;
            hpText.textContent=player.hp;

            if(player.hp<=0){

                alert(
                "GAME OVER\nSkor: "+score
                );

                location.reload();
            }
        }

        if(b.y>canvas.height)
            enemyBullets.splice(i,1);
    });

    explosions.forEach((p,i)=>{

        p.x+=p.vx;
        p.y+=p.vy;
        p.life--;

        if(p.life<=0)
            explosions.splice(i,1);
    });
}

function draw(){

    ctx.fillStyle="#000";
    ctx.fillRect(0,0,
        canvas.width,
        canvas.height);

    drawStars();

    drawPlayer();

    enemies.forEach(e=>{
        drawEnemy(e.x,e.y);
    });

    bullets.forEach(b=>{

        ctx.fillStyle="#00ffff";

        ctx.beginPath();
        ctx.arc(
            b.x,b.y,b.r,
            0,Math.PI*2
        );
        ctx.fill();
    });

    enemyBullets.forEach(b=>{

        ctx.fillStyle="red";

        ctx.beginPath();
        ctx.arc(
            b.x,b.y,5,
            0,Math.PI*2
        );
        ctx.fill();
    });

    explosions.forEach(p=>{

        ctx.fillStyle=
        "rgba(255,180,0,"+
        (p.life/30)+")";

        ctx.beginPath();
        ctx.arc(
            p.x,p.y,4,
            0,Math.PI*2
        );
        ctx.fill();
    });
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}
loop();

function hold(el,start,end){

    el.addEventListener(
    "touchstart",
    e=>{
        e.preventDefault();
        start();
    });

    el.addEventListener(
    "touchend",
    e=>{
        e.preventDefault();
        end();
    });
}

hold(
document.getElementById("left"),
()=>left=true,
()=>left=false
);

hold(
document.getElementById("right"),
()=>right=true,
()=>right=false
);

document.getElementById("shoot")
.addEventListener(
"touchstart",
e=>{
    e.preventDefault();
    shoot();
});
</script>

</body>
</html>
